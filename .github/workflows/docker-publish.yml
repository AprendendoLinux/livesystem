name: Deploy Automático (GHCR)

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  # Mude aqui para o nome do repositório onde você subir este projeto
  IMAGE_NAME: aprendendolinux/live-cam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados (Tags Docker)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha,format=short

      # CÁLCULO INTELIGENTE DA VERSÃO IDÊNTICO AO PROJETO IPV6
      - name: Definir Versão (Tag ou Hash)
        id: prep
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "Modo: TAG DE PRODUÇÃO"
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            VERSION="dev-${SHORT_SHA}"
            echo "Modo: DESENVOLVIMENTO (HASH)"
          else
            VERSION="latest-${SHORT_SHA}"
            echo "Modo: MAIN (LATEST)"
          fi
          
          echo "Versão Calculada: $VERSION"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # INJETA A VERSÃO DIRETAMENTE NO DOCKERFILE
          build-args: |
            APP_VERSION=${{ steps.prep.outputs.VERSION }}