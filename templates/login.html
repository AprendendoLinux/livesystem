<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stream Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root { --bg-base: #0b0c10; --card-bg: rgba(31, 40, 51, 0.85); --neon-blue: #66fcf1; --text-main: #ffffff; --text-muted: #8a9ba8; }
        body { background: radial-gradient(circle at 50% 0%, #1a222c 0%, var(--bg-base) 70%); color: var(--text-main); font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .login-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 40px 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; text-align: center; margin-bottom: 60px; }
        .login-card i.fa-lock { font-size: 3rem; color: var(--neon-blue); margin-bottom: 20px; text-shadow: 0 0 10px rgba(102, 252, 241, 0.4); }
        h2 { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        
        .input-group { margin-bottom: 20px; text-align: left; width: 100%; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #0b0c10; color: white; font-family: 'Share Tech Mono', monospace; }
        .input-group input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(102, 252, 241, 0.3); }
        
        /* CSS do "Olho" da Senha */
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { padding-right: 40px; } /* Espaço para o ícone não encostar no texto */
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; transition: color 0.3s ease; }
        .toggle-password:hover { color: var(--neon-blue); }

        button { background: var(--neon-blue); color: var(--bg-base); border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        button:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(102, 252, 241, 0.5); }
        .error-msg { color: #ff4b4b; margin-bottom: 15px; font-weight: 600; background: rgba(255, 75, 75, 0.1); padding: 10px; border-radius: 6px; }
        
        /* CSS do Rodapé Fixo */
        .fixed-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 45px; background: rgba(11, 12, 16, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1rem; gap: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); }
        .footer-text { color: var(--text-muted); }
        .footer-text a { color: var(--neon-blue); text-decoration: none; font-weight: 700; }
        .footer-separator { color: var(--text-muted); opacity: 0.5; }
        .footer-version { color: #39ff14; background: rgba(57, 255, 20, 0.08); padding: 2px 10px; border-radius: 4px; border: 1px solid rgba(57, 255, 20, 0.2); font-family: 'Share Tech Mono', monospace; font-weight: bold; }
        
        @media (max-width: 768px) { .fixed-footer { height: auto; padding: 10px 5px; flex-direction: column; gap: 5px; } .footer-separator { display: none; } }
    </style>
</head>
<body>
    <div class="login-card">
        <i class="fas fa-lock"></i>
        <h2>Acesso Restrito</h2>
        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" required>
                    <i class="fas fa-eye toggle-password" id="togglePasswordIcon" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>

    {% include 'footer.html' %}

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                icon.style.color = 'var(--neon-blue)';
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                icon.style.color = 'var(--text-muted)';
            }
        }
    </script>
</body>
</html>
