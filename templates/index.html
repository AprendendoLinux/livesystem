<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server | Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* A Mágica do Box-Sizing: impede que padding/bordas quebrem o layout */
        * { box-sizing: border-box; }
        
        :root { --bg-base: #0b0c10; --card-bg: rgba(31, 40, 51, 0.85); --neon-blue: #66fcf1; --neon-red: #ff4b4b; --text-main: #ffffff; --text-muted: #8a9ba8; }
        
        /* Ajuste do Body para remover scroll vertical fantasma */
        body { background: radial-gradient(circle at 50% 0%, #1a222c 0%, var(--bg-base) 70%); color: var(--text-main); font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Margem inferior no card para compensar o rodapé */
        .stream-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 900px; margin-bottom: 50px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .header-badges { display: flex; gap: 10px; align-items: center; }
        h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; font-size: 1.5rem; font-weight: 700; }
        .video-container { position: relative; overflow: hidden; border-radius: 8px; background: #000; border: 1px solid #333; display: flex; justify-content: center; align-items: center; aspect-ratio: 16/9; width: 100%; }
        img#video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; transform-origin: center center; display: none; }
        .placeholder { position: absolute; color: #555; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .placeholder.hidden { display: none; }
        .controls { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        
        /* Botões padronizados com text-align center para o block no mobile */
        button, a.btn-logout { text-align: center; display: block; background: #2b3a4a; color: #888; border: 1px solid #555; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: all 0.2s ease; text-decoration: none; font-family: 'Rajdhani', sans-serif;}
        button:hover, a.btn-logout:hover { filter: brightness(1.2); }
        button.active-blue { color: var(--bg-base); background: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(102, 252, 241, 0.6); }
        button.active-red { color: white; background: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 10px rgba(255, 75, 75, 0.6); }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.9em; font-weight: bold; background: rgba(255,255,255,0.05); color: var(--text-muted); font-family: 'Share Tech Mono', monospace; }
        .status-badge.online { color: var(--neon-blue); background: rgba(102, 252, 241, 0.1); border: 1px solid rgba(102, 252, 241, 0.3); }
        .viewer-badge { background: rgba(57, 255, 20, 0.1); border: 1px solid rgba(57, 255, 20, 0.3); color: #39ff14; display: none; }
        
        .fixed-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 45px; background: rgba(11, 12, 16, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1rem; gap: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); }
        .footer-text { color: var(--text-muted); }
        .footer-text a { color: var(--neon-blue); text-decoration: none; font-weight: 700; }
        .footer-separator { color: var(--text-muted); opacity: 0.5; }
        .footer-version { color: #39ff14; background: rgba(57, 255, 20, 0.08); padding: 2px 10px; border-radius: 4px; border: 1px solid rgba(57, 255, 20, 0.2); font-family: 'Share Tech Mono', monospace; font-weight: bold; }
        
        /* Ajuste Mobile: Garante que controles não vazem do width */
        @media (max-width: 768px) { .header-panel { flex-direction: column; text-align: center; } .controls { flex-direction: column; width: 100%; gap: 10px; margin-top: 15px; } button, a.btn-logout { width: 100%; } .fixed-footer { height: auto; padding: 10px 5px; flex-direction: column; gap: 5px; } .footer-separator { display: none; } }
    </style>
</head>
<body>
    <div class="stream-card">
        <div class="header-panel">
            <h2><i class="fas fa-video"></i> Live Monitor</h2>
            <div class="header-badges">
                <div class="status-badge viewer-badge" id="viewerCount"><i class="fas fa-eye"></i> 0</div>
                <div class="status-badge" id="status">Offline</div>
            </div>
        </div>
        
        <div class="video-container" id="videoContainer">
            <div class="placeholder" id="placeholder">
                <i class="fas fa-camera-slash" style="font-size: 3rem;"></i>
                Câmera Desligada
            </div>
            <img id="video" alt="Stream da Câmera">
        </div>

        <div class="controls">
            <button id="btnPower" onclick="toggleStream()" class="active-blue"><i class="fas fa-power-off"></i> Ligar Sistema</button>
            <button id="btnZoomIn" onclick="zoomIn()"><i class="fas fa-search-plus"></i></button>
            <button id="btnZoomOut" onclick="zoomOut()"><i class="fas fa-search-minus"></i></button>
            <button id="btnResetZoom" onclick="resetZoom()"><i class="fas fa-compress"></i></button>
            <button id="btnFullscreen" onclick="toggleFullScreen()"><i class="fas fa-expand"></i> Tela Cheia</button>
            <a href="/logout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </div>

    {% include 'footer.html' %}

    <script>
        const video = document.getElementById('video'); const placeholder = document.getElementById('placeholder'); const statusEl = document.getElementById('status'); const viewerCountEl = document.getElementById('viewerCount'); const btnPower = document.getElementById('btnPower');
        let ws = null; let isStreaming = false; let currentZoom = 1; let currentObjectURL = null;

        function startStream() {
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            ws.binaryType = 'blob';

            ws.onopen = () => { video.style.display = 'block'; placeholder.classList.add('hidden'); statusEl.innerHTML = '● LIVE'; statusEl.classList.add('online'); };
            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    try { const data = JSON.parse(event.data); if (data.type === 'viewers') { viewerCountEl.innerHTML = `<i class="fas fa-eye"></i> ${data.count}`; viewerCountEl.style.display = data.count > 0 ? 'block' : 'none'; } } catch (e) {} return;
                }
                if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(event.data); video.src = currentObjectURL;
            };
            ws.onclose = () => stopStreamVisuals();
        }

        function stopStream() { if (ws) { ws.send('stop'); ws.close(); } stopStreamVisuals(); }
        function stopStreamVisuals() { if (currentObjectURL) { URL.revokeObjectURL(currentObjectURL); currentObjectURL = null; } video.src = ''; video.style.display = 'none'; placeholder.classList.remove('hidden'); statusEl.innerText = 'Offline'; statusEl.classList.remove('online'); viewerCountEl.style.display = 'none'; btnPower.innerHTML = '<i class="fas fa-power-off"></i> Ligar Sistema'; btnPower.classList.replace('active-red', 'active-blue'); isStreaming = false; }
        function toggleStream() { if (isStreaming) { stopStream(); } else { startStream(); btnPower.innerHTML = '<i class="fas fa-stop"></i> Desligar Câmera'; btnPower.classList.replace('active-blue', 'active-red'); isStreaming = true; } }
        function updateBtnState(btnId, isActive) { const btn = document.getElementById(btnId); isActive ? btn.classList.add('active-blue') : btn.classList.remove('active-blue'); }
        function zoomIn() { currentZoom += 0.2; video.style.transform = `scale(${currentZoom})`; updateBtnState('btnZoomIn', true); setTimeout(() => updateBtnState('btnZoomIn', false), 200); }
        function zoomOut() { if (currentZoom > 0.4) { currentZoom -= 0.2; video.style.transform = `scale(${currentZoom})`; updateBtnState('btnZoomOut', true); setTimeout(() => updateBtnState('btnZoomOut', false), 200); } }
        function resetZoom() { currentZoom = 1; video.style.transform = `scale(${currentZoom})`; updateBtnState('btnResetZoom', true); setTimeout(() => updateBtnState('btnResetZoom', false), 200); }
        function toggleFullScreen() { const container = document.getElementById('videoContainer'); if (!document.fullscreenElement) { container.requestFullscreen().catch(err => console.log(err)); updateBtnState('btnFullscreen', true); } else { document.exitFullscreen(); updateBtnState('btnFullscreen', false); } }
    </script>
</body>
</html>
