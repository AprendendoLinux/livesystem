version: '3.8'

services:
  webrtc-stream:
    build: .
    container_name: live-cam
    restart: unless-stopped
    ports:
      - "8080:8080"
    devices:
      - "/dev/video0:/dev/video0"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_USER=stream_user
      - DB_PASS=stream_pass
      - DB_NAME=stream_db
    depends_on:
      - db

  db:
    image: mysql:latest
    container_name: stream-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: stream_db
      MYSQL_USER: stream_user
      MYSQL_PASSWORD: stream_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: