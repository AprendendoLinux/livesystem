<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server | Live WebRTC</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-blue: #66fcf1;
            --text-color: #c5c6c7;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .stream-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 24px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 10px rgba(102, 252, 241, 0.2); 
            border: 1px solid rgba(102, 252, 241, 0.1); 
            width: 100%;
            max-width: 800px;
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { 
            color: var(--neon-blue); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 0; 
            font-size: 1.4rem;
        }
        .video-container {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video { 
            width: 100%; 
            transition: transform 0.3s ease;
            transform-origin: center center;
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #2b3a4a;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .status-badge { 
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em; 
            font-weight: bold;
            background: #2a2a35;
            color: #aaaaaa;
        }
        .status-badge.online {
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
        }
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="stream-card">
        <div class="header-panel">
            <h2>Live Monitor</h2>
            <div class="status-badge" id="status">Conectando...</div>
        </div>
        
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay playsinline muted></video>
        </div>

        <div class="controls">
            <button onclick="togglePlay()">Ligar/Desligar</button>
            <button onclick="zoomIn()">Zoom +</button>
            <button onclick="zoomOut()">Zoom -</button>
            <button onclick="resetZoom()">Resetar Zoom</button>
            <button onclick="toggleFullScreen()">Tela Cheia</button>
        </div>

        <div class="footer">
            Sistema de Stream &bull; Henrique Fagundes
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        let currentZoom = 1;

        async function startStream() {
            const pc = new RTCPeerConnection();
            
            pc.addEventListener('track', function(evt) {
                if (evt.track.kind === 'video') {
                    video.srcObject = evt.streams[0];
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = '● LIVE';
                    statusEl.classList.add('online');
                }
            });

            const offer = await pc.createOffer({offerToReceiveVideo: true});
            await pc.setLocalDescription(offer);

            const response = await fetch('/offer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type
                })
            });

            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        }

        // Funções dos Controles
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        function zoomIn() {
            currentZoom += 0.2;
            video.style.transform = `scale(${currentZoom})`;
        }

        function zoomOut() {
            if (currentZoom > 0.4) {
                currentZoom -= 0.2;
                video.style.transform = `scale(${currentZoom})`;
            }
        }

        function resetZoom() {
            currentZoom = 1;
            video.style.transform = `scale(${currentZoom})`;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(err => {
                    console.log(`Erro ao tentar entrar em tela cheia: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        startStream().catch(console.error);
    </script>
</body>
</html>
