<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server | Live WebSocket</title>
    <style>
        :root {
            --bg-color: #0b0c10; --card-bg: #1f2833;
            --neon-blue: #66fcf1; --neon-red: #ff4b4b; --text-color: #c5c6c7;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .stream-card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 10px rgba(102, 252, 241, 0.2); border: 1px solid rgba(102, 252, 241, 0.1); width: 100%; max-width: 800px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-badges { display: flex; gap: 10px; align-items: center; }
        h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; font-size: 1.4rem; }
        
        .video-container { position: relative; overflow: hidden; border-radius: 8px; background: #000; border: 1px solid #333; display: flex; justify-content: center; align-items: center; aspect-ratio: 4/3; }
        img#video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; transform-origin: center center; display: none; }
        .placeholder { position: absolute; color: #555; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .placeholder.hidden { display: none; }
        
        .controls { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        button { background: #2b3a4a; color: #888; border: 1px solid #555; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; transition: all 0.2s ease; }
        button:hover { filter: brightness(1.2); }
        button.active-blue { color: var(--bg-color); background: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(102, 252, 241, 0.6); }
        button.active-red { color: white; background: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 10px rgba(255, 75, 75, 0.6); }
        
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: bold; background: #2a2a35; color: #aaaaaa; }
        .status-badge.online { color: #00ffcc; background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.3); }
        .viewer-badge { background: rgba(102, 252, 241, 0.1); border: 1px solid rgba(102, 252, 241, 0.3); color: var(--neon-blue); display: none; }
        
        .footer { margin-top: 25px; text-align: center; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <div class="stream-card">
        <div class="header-panel">
            <h2>Live Monitor</h2>
            <div class="header-badges">
                <div class="status-badge viewer-badge" id="viewerCount">👁️ 0</div>
                <div class="status-badge" id="status">Offline</div>
            </div>
        </div>
        
        <div class="video-container" id="videoContainer">
            <div class="placeholder" id="placeholder">
                <svg width="48" height="48" fill="none" stroke="#555" stroke-width="2" viewBox="0 0 24 24"><path d="M1 1l22 22M21 21H3a2 2 0 01-2-2V7a2 2 0 012-2h1.5l1.27-1.81A1.99 1.99 0 017.4 2h5.6M23 15V7a2 2 0 00-2-2h-3.4l-1.27-1.81A1.99 1.99 0 0014.6 2h-1.6M14.12 14.12A3.98 3.98 0 0112 15a4 4 0 01-4-4c0-.77.22-1.49.6-2.08"/></svg>
                Câmera Desligada
            </div>
            <img id="video" alt="Stream da Câmera">
        </div>

        <div class="controls">
            <button id="btnPower" onclick="toggleStream()" class="active-blue">Ligar Sistema</button>
            <button id="btnZoomIn" onclick="zoomIn()">Zoom +</button>
            <button id="btnZoomOut" onclick="zoomOut()">Zoom -</button>
            <button id="btnResetZoom" onclick="resetZoom()">Resetar Zoom</button>
            <button id="btnFullscreen" onclick="toggleFullScreen()">Tela Cheia</button>
        </div>

        <div class="footer">Sistema de Stream &bull; Henrique Fagundes</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const placeholder = document.getElementById('placeholder');
        const statusEl = document.getElementById('status');
        const viewerCountEl = document.getElementById('viewerCount');
        const btnPower = document.getElementById('btnPower');
        
        let ws = null;
        let isStreaming = false;
        let currentZoom = 1;
        let currentObjectURL = null;

        function startStream() {
            statusEl.innerText = 'Conectando...';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'blob';

            ws.onopen = () => {
                video.style.display = 'block';
                placeholder.classList.add('hidden');
                statusEl.innerText = '● LIVE (TCP)';
                statusEl.classList.add('online');
            };

            ws.onmessage = (event) => {
                // Roteador de mensagens: se for String (JSON), é o contador!
                if (typeof event.data === 'string') {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'viewers') {
                            viewerCountEl.innerText = `👁️ ${data.count}`;
                            viewerCountEl.style.display = data.count > 0 ? 'block' : 'none';
                        }
                    } catch (e) {
                        console.error('Erro ao ler JSON:', e);
                    }
                    return;
                }

                // Se não for string, é o Blob da imagem da câmera
                if (currentObjectURL) {
                    URL.revokeObjectURL(currentObjectURL);
                }
                currentObjectURL = URL.createObjectURL(event.data);
                video.src = currentObjectURL;
            };

            ws.onclose = () => {
                stopStreamVisuals();
            };
        }

        function stopStream() {
            if (ws) {
                ws.send('stop');
                ws.close();
            }
            stopStreamVisuals();
        }

        function stopStreamVisuals() {
            if (currentObjectURL) {
                URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = null;
            }
            video.src = '';
            video.style.display = 'none';
            placeholder.classList.remove('hidden');
            statusEl.innerText = 'Offline';
            statusEl.classList.remove('online');
            viewerCountEl.style.display = 'none'; // Esconde o contador
            
            btnPower.innerText = 'Ligar Sistema';
            btnPower.classList.replace('active-red', 'active-blue');
            isStreaming = false;
        }

        function toggleStream() {
            if (isStreaming) {
                stopStream();
            } else {
                startStream();
                btnPower.innerText = 'Desligar Câmera';
                btnPower.classList.replace('active-blue', 'active-red');
                isStreaming = true;
            }
        }

        // Controles Visuais
        function updateBtnState(btnId, isActive) {
            const btn = document.getElementById(btnId);
            isActive ? btn.classList.add('active-blue') : btn.classList.remove('active-blue');
        }

        function zoomIn() {
            currentZoom += 0.2;
            video.style.transform = `scale(${currentZoom})`;
            updateBtnState('btnZoomIn', true);
            setTimeout(() => updateBtnState('btnZoomIn', false), 200);
        }

        function zoomOut() {
            if (currentZoom > 0.4) {
                currentZoom -= 0.2;
                video.style.transform = `scale(${currentZoom})`;
                updateBtnState('btnZoomOut', true);
                setTimeout(() => updateBtnState('btnZoomOut', false), 200);
            }
        }

        function resetZoom() {
            currentZoom = 1;
            video.style.transform = `scale(${currentZoom})`;
            updateBtnState('btnResetZoom', true);
            setTimeout(() => updateBtnState('btnResetZoom', false), 200);
        }

        function toggleFullScreen() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
                updateBtnState('btnFullscreen', true);
            } else {
                document.exitFullscreen();
                updateBtnState('btnFullscreen', false);
            }
        }
    </script>
</body>
</html>
